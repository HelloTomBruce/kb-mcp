name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Build sdist + wheel
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  determine-target:
    name: Determine target
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.target.outputs.repository }}
    steps:
      - name: Determine target repository
        id: target
        run: |
          # Prerelease tags look like v0.1.0a1, v1.0.0b2, v0.2.0rc1.
          # Stable tags look like v0.1.0.
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+[ab]|^v[0-9]+\.[0-9]+\.[0-9]+rc ]]; then
            echo "repository=testpypi" >> "$GITHUB_OUTPUT"
            echo "Target: TestPyPI (prerelease tag ${GITHUB_REF_NAME})"
          else
            echo "repository=pypi" >> "$GITHUB_OUTPUT"
            echo "Target: PyPI (stable tag ${GITHUB_REF_NAME})"
          fi

  publish:
    name: Publish (${{ needs.determine-target.outputs.repository }})
    needs: [build, determine-target]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for trusted publishing (OIDC)
      actions: read     # required to download artifacts
      contents: read    # safety
    environment:
      name: ${{ needs.determine-target.outputs.repository }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        if: needs.determine-target.outputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI
        if: needs.determine-target.outputs.repository == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
